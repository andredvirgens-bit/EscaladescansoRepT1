<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Consulta Almoço — T1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F5F5F5;
  color: #1A1A1A;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding-bottom: 32px;
}
.header {
  background: #1A1A1A;
  padding: 16px 20px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-title { color: #F5F5F5; font-size: 16px; font-weight: 700; line-height: 1.2; }
.header-sub { color: #AAAAAA; font-size: 12px; margin-top: 2px; }
.date-banner {
  background: #FFE600;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  color: #1A1A1A;
  text-align: center;
}
.search-area { padding: 20px 16px 12px; }
.search-label { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 10px; display: block; }
.search-wrapper { display: flex; gap: 8px; }
.search-input {
  flex: 1;
  background: #FFFFFF;
  border: 2px solid #DDDDDD;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 16px;
  color: #1A1A1A;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.search-input:focus { border-color: #FFE600; }
.btn-buscar {
  background: #FFE600;
  border: none;
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 700;
  color: #1A1A1A;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-buscar:active { opacity: .8; }

.suggestions {
  background: #FFFFFF;
  border: 1px solid #DDD;
  border-radius: 10px;
  margin: 0 16px;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  display: none;
}
.suggestion-item {
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 600;
  border-bottom: 1px solid #EEE;
  cursor: pointer;
  color: #1A1A1A;
  -webkit-tap-highlight-color: transparent;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:active { background: #FFF9CC; }
.suggestion-sub { font-size: 12px; color: #888; font-weight: 400; margin-top: 2px; }

.result-area { padding: 16px 16px 0; }

.card-folga {
  background: #FFFFFF;
  border: 2px solid #3B82F6;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}
.folga-icon { font-size: 40px; margin-bottom: 8px; }
.folga-nome { font-size: 18px; font-weight: 800; color: #1A1A1A; text-transform: uppercase; margin-bottom: 6px; }
.folga-turma { font-size: 13px; color: #666; margin-bottom: 12px; }
.folga-badge { display: inline-block; background: #DBEAFE; color: #1D4ED8; font-size: 15px; font-weight: 700; padding: 8px 20px; border-radius: 8px; }

.card-almoco { background: #FFFFFF; border: 2px solid #EEE; border-radius: 14px; overflow: hidden; }
.card-almoco-top { padding: 18px 20px 14px; border-bottom: 1px solid #EEE; }
.rep-nome { font-size: 18px; font-weight: 800; color: #1A1A1A; text-transform: uppercase; line-height: 1.3; margin-bottom: 6px; }
.rep-meta { font-size: 13px; color: #888; }
.rep-meta span { display: inline-block; margin-right: 10px; }

.slot-block { padding: 20px; text-align: center; }
.slot-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 10px; }
.slot-hora { font-size: 38px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
.slot-hora-sub { font-size: 14px; color: #666; margin-bottom: 16px; }
.slot-a .slot-hora { color: #DC6803; }
.slot-a-badge { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 16px; font-weight: 800; padding: 10px 28px; border-radius: 10px; border: 2px solid #F59E0B; }
.slot-b .slot-hora { color: #0369A1; }
.slot-b-badge { display: inline-block; background: #E0F2FE; color: #0C4A6E; font-size: 16px; font-weight: 800; padding: 10px 28px; border-radius: 10px; border: 2px solid #38BDF8; }

.turma-pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; margin-right: 4px; }
.turma-a { background: rgba(220,38,38,.12); color: #991B1B; }
.turma-b { background: rgba(202,138,4,.15); color: #78350F; }
.turma-c { background: rgba(8,145,178,.12); color: #0C4A6E; }
.turma-d { background: rgba(167,139,250,.2); color: #4C1D95; }

.not-found { background: #FFFFFF; border: 2px solid #EEE; border-radius: 14px; padding: 28px 20px; text-align: center; }
.not-found-icon { font-size: 36px; margin-bottom: 10px; }
.not-found-text { font-size: 15px; color: #666; }
.not-found-hint { font-size: 13px; color: #AAA; margin-top: 6px; }

.state-card { background: #FFFFFF; border: 2px solid #EEE; border-radius: 14px; padding: 32px 20px; text-align: center; }
.state-icon { font-size: 40px; margin-bottom: 10px; }
.state-text { font-size: 15px; color: #666; }

.footer { text-align: center; padding: 28px 16px 0; font-size: 12px; color: #AAAAAA; }
</style>
</head>
<body>

<div class="header">
  <svg width="48" height="17" viewBox="0 0 48 17" fill="none">
    <text x="0" y="14" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#FFE600">MELI</text>
  </svg>
  <div>
    <div class="header-title">Escala de Almoço</div>
    <div class="header-sub">Turno T1 · BRBA01</div>
  </div>
</div>

<div class="date-banner" id="dateBanner"></div>

<div class="search-area">
  <label class="search-label">Digite seu nome para consultar:</label>
  <div class="search-wrapper">
    <input type="text" id="searchInput" class="search-input"
      placeholder="Ex: ANA PAULA..."
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
      oninput="onSearchInput()" onkeydown="onSearchKey(event)">
    <button class="btn-buscar" onclick="buscarManual()">Buscar</button>
  </div>
</div>

<div class="suggestions" id="suggestions"></div>

<div class="result-area" id="resultArea">
  <div class="state-card">
    <div class="state-icon">🔍</div>
    <div class="state-text">Busque seu nome acima</div>
  </div>
</div>

<div class="footer">Turno T1 &middot; Horários: 10:00–11:00 (A) e 11:00–12:00 (B)</div>

<script>

// ===================== HELPERS =====================
function dateKey(d) {
  var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function formatDate(d) {
  var dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}
function isFolga(turno_grupo) {
  var today = dateKey(new Date());
  var folgas = FOLGAS_2026[turno_grupo] || [];
  return folgas.indexOf(today) !== -1;
}
function turmaClass(tg) {
  if (tg === 'T1-A') return 'turma-a';
  if (tg === 'T1-B') return 'turma-b';
  if (tg === 'T1-C') return 'turma-c';
  return 'turma-d';
}
function normalize(s) {
  return s.toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,'');
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===================== SEARCH =====================
var _searchTimer = null;
var _suggestions = [];

function onSearchInput() {
  clearTimeout(_searchTimer);
  var val = document.getElementById('searchInput').value.trim();
  if (val.length < 2) { hideSuggestions(); return; }
  _searchTimer = setTimeout(function() { fetchSuggestions(val); }, 250);
}

function onSearchKey(e) {
  if (e.key === 'Enter') { clearTimeout(_searchTimer); hideSuggestions(); buscarManual(); }
}

function fetchSuggestions(q) {
  var encoded = encodeURIComponent(q.toUpperCase());
  sbGet('reps?nome=ilike.*' + encoded + '*&ativo=eq.true&select=re,nome,turno_grupo,tl,grupo_almoco&order=nome&limit=6')
    .then(function(rows) {
      if (!Array.isArray(rows) || rows.length === 0) { hideSuggestions(); return; }
      _suggestions = rows;
      var html = '';
      rows.forEach(function(r, i) {
        html += '<div class="suggestion-item" onclick="selectRep('+i+')">'
          + escHtml(r.nome)
          + '<div class="suggestion-sub">'+escHtml(r.turno_grupo)+' &middot; TL: '+escHtml(r.tl)+'</div>'
          + '</div>';
      });
      document.getElementById('suggestions').innerHTML = html;
      document.getElementById('suggestions').style.display = 'block';
    })
    .catch(function() { hideSuggestions(); });
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

function selectRep(idx) {
  var rep = _suggestions[idx];
  document.getElementById('searchInput').value = rep.nome;
  hideSuggestions();
  showLoading();
  buscarRep(rep);
}

function buscarManual() {
  hideSuggestions();
  var val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  showLoading();
  var encoded = encodeURIComponent(val.toUpperCase());
  sbGet('reps?nome=ilike.*' + encoded + '*&ativo=eq.true&select=re,nome,turno_grupo,tl,grupo_almoco&order=nome&limit=1')
    .then(function(rows) {
      if (!Array.isArray(rows) || rows.length === 0) { renderNotFound(); return; }
      buscarRep(rows[0]);
    })
    .catch(function() { renderErro(); });
}

function buscarRep(rep) {
  var today = dateKey(new Date());
  sbGet('escala_dia?data=eq.' + today + '&rep_re=eq.' + rep.re + '&select=slot,grupo_almoco,status,liberado_em,retornou_em')
    .then(function(rows) {
      var diaRep = (rows && rows.length > 0) ? rows[0] : null;
      var grupo;
      if (diaRep && diaRep.slot !== null && diaRep.slot !== undefined) {
        // slot 0 = 10:00-11:00 (A), slot 1 = 11:00-12:00 (B)
        grupo = (diaRep.slot === 0) ? 'A' : 'B';
      } else if (diaRep && diaRep.grupo_almoco) {
        grupo = diaRep.grupo_almoco;
      } else {
        grupo = rep.grupo_almoco;
      }
      renderResult(rep, grupo);
    })
    .catch(function() { renderResult(rep, rep.grupo_almoco); });
}

// ===================== RENDER =====================
function showLoading() {
  document.getElementById('resultArea').innerHTML =
    '<div class="state-card"><div class="state-icon">⏳</div><div class="state-text">Consultando...</div></div>';
}

function renderResult(rep, grupo) {
  var area = document.getElementById('resultArea');
  var tc = turmaClass(rep.turno_grupo);

  if (isFolga(rep.turno_grupo)) {
    area.innerHTML =
      '<div class="card-folga">'
      + '<div class="folga-icon">🏖️</div>'
      + '<div class="folga-nome">'+escHtml(rep.nome)+'</div>'
      + '<div class="folga-turma"><span class="turma-pill '+tc+'">'+escHtml(rep.turno_grupo)+'</span> TL: '+escHtml(rep.tl)+'</div>'
      + '<div class="folga-badge">Folga hoje</div>'
      + '</div>';
    return;
  }

  var isA = grupo === 'A';
  var slotClass = isA ? 'slot-a' : 'slot-b';
  var hora = isA ? '10:00' : '11:00';
  var horaFim = isA ? '11:00' : '12:00';
  var badgeClass = isA ? 'slot-a-badge' : 'slot-b-badge';

  area.innerHTML =
    '<div class="card-almoco">'
    + '<div class="card-almoco-top">'
    + '<div class="rep-nome">'+escHtml(rep.nome)+'</div>'
    + '<div class="rep-meta"><span class="turma-pill '+tc+'">'+escHtml(rep.turno_grupo)+'</span><span>TL: '+escHtml(rep.tl)+'</span></div>'
    + '</div>'
    + '<div class="slot-block '+slotClass+'">'
    + '<div class="slot-label">Horário de almoço hoje</div>'
    + '<div class="slot-hora">'+hora+'</div>'
    + '<div class="slot-hora-sub">até '+horaFim+'</div>'
    + '<div class="'+badgeClass+'">Grupo '+grupo+'</div>'
    + '</div>'
    + '</div>';
}

function renderNotFound() {
  var val = escHtml(document.getElementById('searchInput').value.trim());
  document.getElementById('resultArea').innerHTML =
    '<div class="not-found">'
    + '<div class="not-found-icon">🔎</div>'
    + '<div class="not-found-text">Nenhum rep encontrado para <strong>"'+val+'"</strong></div>'
    + '<div class="not-found-hint">Verifique o nome e tente novamente</div>'
    + '</div>';
}

function renderErro() {
  document.getElementById('resultArea').innerHTML =
    '<div class="not-found">'
    + '<div class="not-found-icon">📡</div>'
    + '<div class="not-found-text">Sem conexão com o servidor</div>'
    + '<div class="not-found-hint">Verifique a rede e tente novamente</div>'
    + '</div>';
}

// ===================== INIT =====================
window.onload = function() {
  document.getElementById('dateBanner').textContent = formatDate(new Date());
};

document.addEventListener('click', function(e) {
  if (!e.target.closest('#suggestions') && !e.target.closest('.search-wrapper')) hideSuggestions();
});
</script>
